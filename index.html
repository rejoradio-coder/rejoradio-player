<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReJo Radio - Live Player</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #ff5f00; /* ReJo Radio accentkleur (pas eventueel aan) */
        }
        .now-playing {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .now-playing h2 {
            font-size: 14px;
            color: #888;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }
        #track-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
        }
        .audio-player {
            margin-bottom: 30px;
        }
        audio {
            width: 100%;
            max-width: 300px;
        }
        .other-players {
            border-top: 1px solid #222;
            padding-top: 20px;
        }
        .other-players p {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .player-links a {
            display: inline-block;
            color: #aaa;
            text-decoration: none;
            font-size: 13px;
            margin: 0 8px;
            transition: color 0.2s;
        }
        .player-links a:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="logo">REJO RADIO</div>

    <div class="now-playing">
        <h2>Nu op ReJo Radio:</h2>
        <div id="track-title">Laden van track informatie...</div>
    </div>

    <div class="audio-player">
        <audio autoplay controls id="radio-stream">
            <source src="https://stream.rejoradio.nl/listen/rejo_radio/radio.mp3" type="audio/mpeg">
            Je browser ondersteunt deze speler niet.
        </audio>
    </div>

    <div class="other-players">
        <p>Luister via je eigen mediaspeler:</p>
        <div class="player-links">
            <a href="https://jouwstreamurl.nl/listen.pls" target="_blank">Winamp</a> | 
            <a href="https://jouwstreamurl.nl/listen.m3u" target="_blank">VLC Player</a> | 
            <a href="https://jouwstreamurl.nl/listen.m3u" target="_blank">Windows Media</a> | 
            <a href="https://jouwstreamurl.nl/listen.ram" target="_blank">RealPlayer</a>
        </div>
    </div>

    <script>
        // BONUS: Hier komt straks het script om de 'Now Playing' metadata op te halen van je stream-server (Shoutcast/Icecast)
        // Voor nu een simpele placeholder demo:
        function updateNowPlaying() {
            // Dit is een voorbeeld. Afhankelijk van je provider (bijv. AzuraCast, Shoutcast) 
            // moet je hier een API-aanroep (fetch) doen naar je server.
            document.getElementById('track-title').innerText = "De Sjonnies - Dans Je De Hele Nacht Met Mij";
        }
        
        // Start de check
        updateNowPlaying();
        // Ververs elke 10 seconden
        setInterval(updateNowPlaying, 10000);
    </script>

</body>
</html>
