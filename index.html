<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReJo Radio - Live Player</title>
    <style>
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .logo-container {
            margin-bottom: 20px;
        }
        .logo-img {
            max-width: 180px;
            height: auto;
        }
        .now-playing {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .now-playing h2 {
            font-size: 14px;
            color: #ff6600;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #track-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            color: #111111;
        }
        .audio-player {
            margin-bottom: 30px;
        }
        audio {
            width: 100%;
            max-width: 300px;
        }
        .other-players {
            border-top: 1px solid #eeeeee;
            padding-top: 20px;
        }
        .other-players p {
            font-size: 12px;
            color: #777777;
            margin-bottom: 10px;
        }
        .player-links a {
            display: inline-block;
            color: #ff6600;
            text-decoration: none;
            font-size: 13px;
            margin: 0 8px;
            font-weight: bold;
            transition: color 0.2s;
        }
        .player-links a:hover {
            color: #111111;
        }
    </style>
</head>
<body>

    <!-- Logo van ReJo Radio -->
    <div class="logo-container">
        <img src="ReJo.png" alt="ReJo Radio Logo" class="logo-img">
    </div>

    <!-- Nu Draait Sectie -->
    <div class="now-playing">
        <h2>Nu op ReJo Radio:</h2>
        <div id="track-title">Laden van track informatie...</div>
    </div>

    <!-- De Audio Player (Autoplay) -->
    <div class="audio-player">
        <audio autoplay controls id="radio-stream">
            <!-- Jouw AzuraCast stream (radio-id 1) -->
            <source src="https://stream.rejoradio.nl/radio/8000/radio.mp3" type="audio/mpeg">
            Je browser ondersteunt deze speler niet.
        </audio>
    </div>

    <!-- Externe Player Links -->
    <div class="other-players">
        <p>Luister via je eigen mediaspeler:</p>
        <div class="player-links">
            <!-- Directe links gegenereerd vanuit jouw AzuraCast -->
            <a href="https://stream.rejoradio.nl/public/rejoradio/listen.pls" target="_blank">Winamp</a> | 
            <a href="https://stream.rejoradio.nl/public/rejoradio/listen.m3u" target="_blank">VLC Player</a> | 
            <a href="https://stream.rejoradio.nl/public/rejoradio/listen.m3u" target="_blank">Windows Media</a> | 
            <a href="https://stream.rejoradio.nl/public/rejoradio/listen.pls" target="_blank">RealPlayer</a>
        </div>
    </div>

    <script>
        // De AzuraCast API-koppeling voor ReJo Radio
        function updateNowPlaying() {
            fetch('https://stream.rejoradio.nl/api/nowplaying/1') 
                .then(response => response.json())
                .then(data => {
                    if (data && data.now_playing && data.now_playing.song) {
                        const song = data.now_playing.song;
                        document.getElementById('track-title').innerText = song.artist + " - " + song.title;
                    }
                })
                .catch(error => {
                    console.error('Fout bij ophalen metadata:', error);
                    document.getElementById('track-title').innerText = "De gezelligste piratenhits & 90s dance!";
                });
        }
        
        // Direct starten en elke 15 seconden verversen
        updateNowPlaying();
        setInterval(updateNowPlaying, 15000);
    </script>

</body>
</html>
